services:
  web:
    build:
      context: ./java-app
      dockerfile: Dockerfile
    container_name: java_app
    ports:
      - "5001:5001"
    environment:
      # Application mode: VULN or FIXED
      MODE: ${MODE:-VULN}
      
      # Database configuration
      DATABASE_URL: jdbc:postgresql://db:5432/mydb
      DB_USER: myuser
      DB_PASSWORD: mypassword
      
      # JWT secrets
      STRONG_SECRET: this_is_a_very_strong_secret_key_with_at_least_32_characters
      
      # Logging
      LOGGING_LEVEL_ROOT: INFO
      
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

  db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydb"]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  pgdata:

networks:
  backend:
    driver: bridge
