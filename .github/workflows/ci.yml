name: CI Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ main]
  pull_request:
    branches: [ main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mydb
          POSTGRES_USER: myuser
          POSTGRES_PASSWORD: mypassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'
        cache: maven
        cache-dependency-path: java-app/pom.xml
    
    - name: Build (Maven)
      run: |
        cd java-app
        mvn -B clean verify -DskipTests

  security-scan:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python (for custom rules)
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      continue-on-error: true
      with:
        scan-type: 'fs'
        scan-ref: './java-app'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'HIGH,CRITICAL'
        exit-code: '0'

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Upload Trivy SARIF artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: trivy-results-sarif
        path: trivy-results.sarif
        if-no-files-found: warn

    - name: Run repository custom rules (SARIF)
      if: always()
      run: |
        python3 custom-rules/scan_project_sarif.py

    - name: Upload custom rules SARIF to GitHub Security
      uses: github/codeql-action/upload-sarif@v4
      if: always() && hashFiles('custom-rules-report.sarif') != ''
      with:
        sarif_file: custom-rules-report.sarif
        category: Repo-Custom-Rules

    - name: Upload custom rules SARIF artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: custom-rules-sarif
        path: custom-rules-report.sarif
        if-no-files-found: warn


  docker-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./java-app
        file: ./java-app/Dockerfile
        push: false
        tags: idor-jwt:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

  pvs-studio-java:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    env:
      PVS_STUDIO_NAME: ${{ secrets.PVS_STUDIO_NAME }}
      PVS_STUDIO_KEY: ${{ secrets.PVS_STUDIO_KEY }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'
        cache: maven
        cache-dependency-path: java-app/pom.xml

    - name: Install PVS-Studio tools
      run: |
        wget -q -O - https://files.pvs-studio.com/etc/pubkey.txt | sudo apt-key add -
        sudo wget -O /etc/apt/sources.list.d/viva64.list https://files.pvs-studio.com/etc/viva64.list
        sudo apt-get update
        sudo apt-get install -y pvs-studio
        pvs-studio-analyzer --version
        command -v plog-converter

    - name: Build Java project
      run: |
        cd java-app
        mvn -B clean compile -DskipTests

    - name: Run PVS-Studio Java analysis
      run: |
        if [ -z "$PVS_STUDIO_NAME" ] || [ -z "$PVS_STUDIO_KEY" ]; then
          echo "PVS_STUDIO_NAME and PVS_STUDIO_KEY GitHub Secrets must be configured."
          exit 1
        fi
        cd java-app
        mkdir -p target/pvs
        mvn -B pvsstudio:pvsAnalyze \
          "-Dpvsstudio.userName=$PVS_STUDIO_NAME" \
          "-Dpvsstudio.licenseKey=$PVS_STUDIO_KEY" \
          "-Dpvsstudio.outputType=log" \
          "-Dpvsstudio.outputFile=target/pvs/PVS-Studio.log" \
          "-Dpvsstudio.analysisMode=GA;OWASP" \
          "-Dpvsstudio.sourceTreeRoot=${PWD}"

    - name: Generate SARIF and HTML reports
      if: always()
      run: |
        cd java-app
        if [ -f target/pvs/PVS-Studio.log ]; then
          plog-converter -t sarif -o target/pvs/pvs-report.sarif target/pvs/PVS-Studio.log
          plog-converter -t fullhtml -o target/pvs/pvs-html-report target/pvs/PVS-Studio.log
        else
          echo "PVS-Studio raw log was not created"
          exit 1
        fi

    - name: Upload PVS SARIF to GitHub Security
      uses: github/codeql-action/upload-sarif@v4
      if: always() && hashFiles('java-app/target/pvs/pvs-report.sarif') != ''
      with:
        sarif_file: java-app/target/pvs/pvs-report.sarif
        category: PVS-Studio-Java

    - name: Upload PVS SARIF artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: pvs-sarif-report
        path: java-app/target/pvs/pvs-report.sarif
        if-no-files-found: warn

    - name: Upload PVS HTML artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: pvs-html-report
        path: java-app/target/pvs/pvs-html-report/
        if-no-files-found: warn

    - name: Upload PVS raw log artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: pvs-raw-report
        path: |
          java-app/target/pvs/PVS-Studio.log
          java-app/target/pvs/*.plog
        if-no-files-found: warn
