# Application Configuration
spring.application.name=idor-jwt-demo
server.port=5001

# Mode: VULN or FIXED
app.mode=${MODE:VULN}

# JWT Configuration
app.jwt.weak-secret=weak_secret_123__weak_secret_123__weak
app.jwt.strong-secret=${STRONG_SECRET:change_me_to_strong_value_at_least_32_characters_long}
app.jwt.expiration=86400000

# Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/mydb}
spring.datasource.username=${DB_USER:myuser}
spring.datasource.password=${DB_PASSWORD:mypassword}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=INFO
logging.level.com.security.demo=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%logger{36}] - %msg%n
