# Test configuration
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Test mode
app.mode=VULN
app.jwt.weak-secret=weak_secret_123__weak_secret_123__weak
app.jwt.strong-secret=test_strong_secret_key_with_32_chars

# Disable data seeder in tests
spring.autoconfigure.exclude=com.security.demo.DataSeeder
